<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgC" cx="50%" cy="60%" r="75%">
      <stop offset="0%" stop-color="#1F2B52"/>
      <stop offset="60%" stop-color="#141E3D"/>
      <stop offset="100%" stop-color="#070B1B"/>
    </radialGradient>
    <linearGradient id="spineC" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="45%" stop-color="#7B6CFF"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="hoodLeftC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#6D5EDB"/>
    </linearGradient>
    <linearGradient id="hoodCenterC" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D4C6FD"/>
      <stop offset="100%" stop-color="#6D5EDB"/>
    </linearGradient>
    <linearGradient id="hoodRightC" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#6D5EDB"/>
    </linearGradient>
    <linearGradient id="headFace" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C6AE0"/>
    </linearGradient>
    <radialGradient id="jewelC" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF7DC"/>
      <stop offset="40%" stop-color="#F5B642"/>
      <stop offset="100%" stop-color="#7A4D10"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#38BDF8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="55%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </radialGradient>
    <radialGradient id="nodeLeader" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF7DC"/>
      <stop offset="55%" stop-color="#F5B642"/>
      <stop offset="100%" stop-color="#B7791F"/>
    </radialGradient>
    <linearGradient id="meshLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#7B6CFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.05"/>
    </linearGradient>

    <!-- ===== Reusable ornate head: ink-style line decoration on a naga head =====
         Designed in a local coordinate space centered at (0,0); head spans roughly
         x:[-50,50], y:[-65,+35]. Scaled/positioned per instance via <use>.
         All decorative strokes use round joins and are thick enough to survive down-scaling. -->
    <g id="nagaHead">
      <!-- head silhouette (thicker outline) -->
      <path d="M -48 -40 Q 0 -92 48 -40 Q 46 28 0 44 Q -46 28 -48 -40 Z"
            fill="url(#headFace)" stroke="#1A1332" stroke-width="5" stroke-linejoin="round"/>

      <!-- dorsal crest ridge (running down the center of the head) -->
      <path d="M 0 -78 L 0 36"
            stroke="#1A1332" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>

      <!-- forehead crest marking (diamond + inner diamond) -->
      <path d="M 0 -60 L 12 -42 L 0 -26 L -12 -42 Z"
            fill="#F5B642" stroke="#1A1332" stroke-width="2"/>
      <path d="M 0 -54 L 6 -42 L 0 -30 L -6 -42 Z" fill="#FFF7DC"/>

      <!-- brow ridges (the arched line above each eye — the KEY "this is a snake" cue) -->
      <path d="M -36 -20 Q -22 -32 -6 -20"
            stroke="#1A1332" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M 36 -20 Q 22 -32 6 -20"
            stroke="#1A1332" stroke-width="3.5" fill="none" stroke-linecap="round"/>

      <!-- cheek / jaw bone line sweeping from below the eye to the mouth -->
      <path d="M -30 -2 Q -20 12 -6 18"
            stroke="#1A1332" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M 30 -2 Q 20 12 6 18"
            stroke="#1A1332" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

      <!-- nostril pair -->
      <ellipse cx="-6" cy="8" rx="2.6" ry="1.5" fill="#1A1332"/>
      <ellipse cx="6" cy="8" rx="2.6" ry="1.5" fill="#1A1332"/>

      <!-- eyes — slit pupil (reptilian, much stronger read than round dot) -->
      <ellipse cx="-22" cy="-10" rx="10" ry="7" fill="#FFF7DC" stroke="#1A1332" stroke-width="2.5"/>
      <ellipse cx="22" cy="-10" rx="10" ry="7" fill="#FFF7DC" stroke="#1A1332" stroke-width="2.5"/>
      <ellipse cx="-22" cy="-10" rx="2.4" ry="6" fill="#1A1332"/>
      <ellipse cx="22" cy="-10" rx="2.4" ry="6" fill="#1A1332"/>
      <!-- eye highlight -->
      <circle cx="-24" cy="-13" r="1.6" fill="#F5B642"/>
      <circle cx="20" cy="-13" r="1.6" fill="#F5B642"/>

      <!-- mouth line -->
      <path d="M -18 24 Q 0 30 18 24"
            stroke="#1A1332" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- scale line bands on the dorsal crown (the V-rows that say "serpent, not dragon") -->
      <g stroke="#1A1332" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.7">
        <path d="M -30 -56 Q 0 -62 30 -56"/>
        <path d="M -34 -46 Q 0 -52 34 -46"/>
        <path d="M -38 -36 Q 0 -42 38 -36"/>
      </g>

      <!-- lateral scale ticks (tiny chevrons along the side of the head) -->
      <g stroke="#1A1332" stroke-width="1.8" fill="none" opacity="0.55" stroke-linecap="round">
        <path d="M -42 -18 l 6 2"/>
        <path d="M -44 -6 l 7 2"/>
        <path d="M -42 8 l 7 1"/>
        <path d="M 42 -18 l -6 2"/>
        <path d="M 44 -6 l -7 2"/>
        <path d="M 42 8 l -7 1"/>
      </g>

      <!-- forked tongue (thicker) -->
      <path d="M 0 40 L -6 62 M 0 40 L 6 62"
            stroke="#38BDF8" stroke-width="4" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Reusable cobra hood (ornate, with 7-petal fringe) -->
    <g id="nagaHood">
      <!-- outer hood flare -->
      <path d="M -95 -20 Q 0 -96 95 -20 Q 88 68 0 92 Q -88 68 -95 -20 Z"
            fill="none" stroke="#1A1332" stroke-width="5" stroke-linejoin="round"/>
      <!-- hood fringe petals (the scalloped bottom edge) -->
      <path d="M -88 18 Q -76 50 -64 30 Q -56 58 -42 34 Q -32 62 -18 38
               Q -8 64 0 40 Q 8 64 18 38 Q 32 62 42 34 Q 56 58 64 30 Q 76 50 88 18"
            fill="none" stroke="#1A1332" stroke-width="3" stroke-linejoin="round" opacity="0.85"/>
    </g>
  </defs>

  <!-- ========== Background ========== -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#bgC)"/>

  <!-- ========== Background mesh network (atmospheric) ========== -->
  <g opacity="0.6">
    <g stroke="url(#meshLine)" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M 120 320 L 260 200"/>
      <path d="M 260 200 L 440 140"/>
      <path d="M 440 140 L 584 140"/>
      <path d="M 584 140 L 764 200"/>
      <path d="M 764 200 L 904 320"/>
      <path d="M 120 320 L 180 520"/>
      <path d="M 180 520 L 140 720"/>
      <path d="M 904 320 L 844 520"/>
      <path d="M 844 520 L 884 720"/>
      <path d="M 260 200 L 180 520"/>
      <path d="M 764 200 L 844 520"/>
      <path d="M 180 520 L 360 610"/>
      <path d="M 844 520 L 664 610"/>
      <path d="M 140 720 L 360 610"/>
      <path d="M 884 720 L 664 610"/>
      <path d="M 140 720 L 340 820"/>
      <path d="M 884 720 L 684 820"/>
      <path d="M 340 820 L 512 860"/>
      <path d="M 684 820 L 512 860"/>
      <path d="M 440 140 L 360 610"/>
      <path d="M 584 140 L 664 610"/>
    </g>
    <g>
      <g transform="translate(120 320)"><circle r="14" fill="url(#nodeGlow)"/><circle r="5" fill="url(#nodeCore)"/></g>
      <g transform="translate(260 200)"><circle r="12" fill="url(#nodeGlow)"/><circle r="4" fill="url(#nodeCore)"/></g>
      <g transform="translate(440 140)"><circle r="12" fill="url(#nodeGlow)"/><circle r="4" fill="url(#nodeCore)"/></g>
      <g transform="translate(584 140)"><circle r="12" fill="url(#nodeGlow)"/><circle r="4" fill="url(#nodeCore)"/></g>
      <g transform="translate(764 200)"><circle r="12" fill="url(#nodeGlow)"/><circle r="4" fill="url(#nodeCore)"/></g>
      <g transform="translate(904 320)"><circle r="14" fill="url(#nodeGlow)"/><circle r="5" fill="url(#nodeCore)"/></g>
      <g transform="translate(180 520)"><circle r="12" fill="url(#nodeGlow)"/><circle r="4" fill="url(#nodeCore)"/></g>
      <g transform="translate(844 520)"><circle r="12" fill="url(#nodeGlow)"/><circle r="4" fill="url(#nodeCore)"/></g>
      <g transform="translate(140 720)"><circle r="12" fill="url(#nodeGlow)"/><circle r="4" fill="url(#nodeCore)"/></g>
      <g transform="translate(884 720)"><circle r="12" fill="url(#nodeGlow)"/><circle r="4" fill="url(#nodeCore)"/></g>
      <g transform="translate(340 820)"><circle r="11" fill="url(#nodeGlow)"/><circle r="3.5" fill="url(#nodeCore)"/></g>
      <g transform="translate(684 820)"><circle r="11" fill="url(#nodeGlow)"/><circle r="3.5" fill="url(#nodeCore)"/></g>
      <g transform="translate(360 610)"><circle r="10" fill="url(#nodeGlow)"/><circle r="3" fill="url(#nodeCore)"/></g>
      <g transform="translate(664 610)"><circle r="10" fill="url(#nodeGlow)"/><circle r="3" fill="url(#nodeCore)"/></g>
    </g>
  </g>

  <!-- ========== Water base ========== -->
  <g opacity="0.9">
    <ellipse cx="512" cy="905" rx="340" ry="16" fill="#38BDF8" opacity="0.18"/>
    <ellipse cx="512" cy="890" rx="260" ry="10" fill="#38BDF8" opacity="0.28"/>
    <ellipse cx="512" cy="878" rx="180" ry="6" fill="#38BDF8" opacity="0.4"/>
  </g>
  <g stroke="#38BDF8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 220 900 Q 260 890 300 900 Q 340 910 380 900"/>
    <path d="M 644 900 Q 684 890 724 900 Q 764 910 804 900"/>
  </g>

  <!-- ========== Main S-curve body (thicker dark outline for definition) ========== -->
  <path d="M 512 880 C 612 810, 420 720, 540 620 C 660 520, 460 440, 512 360"
        stroke="#1A1332" stroke-width="64" fill="none" stroke-linecap="round"/>
  <path d="M 512 880 C 612 810, 420 720, 540 620 C 660 520, 460 440, 512 360"
        stroke="url(#spineC)" stroke-width="56" fill="none" stroke-linecap="round"/>
  <path d="M 512 880 C 612 810, 420 720, 540 620 C 660 520, 460 440, 512 360"
        stroke="#D4C6FD" stroke-width="14" fill="none" stroke-linecap="round"
        opacity="0.35" transform="translate(-6 -4)"/>

  <!-- scale bands on body -->
  <g stroke="#1A1332" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round">
    <path d="M 498 855 Q 512 862 526 855"/>
    <path d="M 528 820 Q 542 827 556 820"/>
    <path d="M 540 780 Q 554 787 568 780"/>
    <path d="M 500 745 Q 514 752 528 745"/>
    <path d="M 460 715 Q 474 722 488 715"/>
    <path d="M 450 675 Q 464 682 478 675"/>
    <path d="M 480 640 Q 494 647 508 640"/>
    <path d="M 530 610 Q 544 617 558 610"/>
    <path d="M 560 570 Q 574 577 588 570"/>
    <path d="M 540 530 Q 554 537 568 530"/>
    <path d="M 500 490 Q 514 497 528 490"/>
    <path d="M 470 450 Q 484 457 498 450"/>
    <path d="M 490 410 Q 504 417 518 410"/>
    <path d="M 510 375 Q 524 382 538 375"/>
  </g>

  <!-- packet dots travelling along spine -->
  <g fill="#F0F9FF" opacity="0.95">
    <circle cx="518" cy="850" r="4"/>
    <circle cx="560" cy="760" r="3.5"/>
    <circle cx="470" cy="690" r="3.5"/>
    <circle cx="500" cy="600" r="4"/>
    <circle cx="560" cy="520" r="3.5"/>
    <circle cx="488" cy="430" r="3.5"/>
  </g>

  <!-- ========== Three necks (with dark outline for definition) ========== -->
  <path d="M 512 360 Q 420 290 320 240" stroke="#1A1332" stroke-width="52" fill="none" stroke-linecap="round"/>
  <path d="M 512 360 Q 420 290 320 240" stroke="url(#spineC)" stroke-width="44" fill="none" stroke-linecap="round"/>
  <path d="M 512 360 L 512 230" stroke="#1A1332" stroke-width="58" fill="none" stroke-linecap="round"/>
  <path d="M 512 360 L 512 230" stroke="url(#spineC)" stroke-width="50" fill="none" stroke-linecap="round"/>
  <path d="M 512 360 Q 604 290 704 240" stroke="#1A1332" stroke-width="52" fill="none" stroke-linecap="round"/>
  <path d="M 512 360 Q 604 290 704 240" stroke="url(#spineC)" stroke-width="44" fill="none" stroke-linecap="round"/>

  <!-- Neck scale rings (thicker and more of them — reads as network hops) -->
  <g stroke="#1A1332" stroke-width="3" fill="#D4C6FD" opacity="0.9">
    <ellipse cx="464" cy="322" rx="16" ry="7" transform="rotate(-28 464 322)"/>
    <ellipse cx="420" cy="302" rx="18" ry="7" transform="rotate(-34 420 302)"/>
    <ellipse cx="560" cy="322" rx="16" ry="7" transform="rotate(28 560 322)"/>
    <ellipse cx="604" cy="302" rx="18" ry="7" transform="rotate(34 604 302)"/>
    <ellipse cx="512" cy="295" rx="20" ry="7"/>
    <ellipse cx="512" cy="264" rx="22" ry="7"/>
  </g>

  <!-- Central coordinator hub -->
  <circle cx="512" cy="360" r="28" fill="#7B6CFF" stroke="#1A1332" stroke-width="4"/>
  <circle cx="512" cy="360" r="14" fill="#D4C6FD"/>
  <circle cx="512" cy="360" r="5" fill="#FFF7DC"/>
  <g stroke="#FFF7DC" stroke-width="2.5" opacity="0.85" stroke-linecap="round">
    <line x1="512" y1="324" x2="512" y2="316"/>
    <line x1="512" y1="396" x2="512" y2="404"/>
    <line x1="476" y1="360" x2="468" y2="360"/>
    <line x1="548" y1="360" x2="556" y2="360"/>
  </g>

  <!-- ========== LEFT: satellites + hood + head ========== -->
  <g>
    <line x1="320" y1="260" x2="230" y2="150" stroke="#7DD3FC" stroke-width="3" opacity="0.85"/>
    <line x1="320" y1="260" x2="180" y2="230" stroke="#7DD3FC" stroke-width="3" opacity="0.85"/>
    <line x1="320" y1="260" x2="200" y2="360" stroke="#7DD3FC" stroke-width="3" opacity="0.85"/>
    <g transform="translate(230 150)"><circle r="17" fill="url(#nodeGlow)"/><circle r="8" fill="url(#nodeCore)" stroke="#1A1332" stroke-width="2"/></g>
    <g transform="translate(180 230)"><circle r="15" fill="url(#nodeGlow)"/><circle r="7" fill="url(#nodeCore)" stroke="#1A1332" stroke-width="2"/></g>
    <g transform="translate(200 360)"><circle r="15" fill="url(#nodeGlow)"/><circle r="7" fill="url(#nodeCore)" stroke="#1A1332" stroke-width="2"/></g>
  </g>
  <g transform="translate(320 242)">
    <!-- hood scaled down from reusable def -->
    <g transform="scale(0.88)">
      <path d="M -95 -20 Q 0 -96 95 -20 Q 88 68 0 92 Q -88 68 -95 -20 Z"
            fill="url(#hoodLeftC)" stroke="#1A1332" stroke-width="5" stroke-linejoin="round"/>
      <path d="M -74 -14 Q 0 -76 74 -14 Q 68 56 0 74 Q -68 56 -74 -14 Z"
            fill="#D4C6FD"/>
      <path d="M -82 14 Q -70 44 -58 26 Q -50 52 -38 30 Q -28 56 -16 34
               Q -6 58 0 36 Q 6 58 16 34 Q 28 56 38 30 Q 50 52 58 26 Q 70 44 82 14"
            fill="none" stroke="#1A1332" stroke-width="2.8" stroke-linejoin="round" opacity="0.8"/>
      <g fill="#F5B642">
        <circle cx="0" cy="-10" r="3"/>
        <circle cx="-20" cy="15" r="2.5"/>
        <circle cx="20" cy="15" r="2.5"/>
        <circle cx="-32" cy="45" r="2"/>
        <circle cx="32" cy="45" r="2"/>
      </g>
    </g>
    <!-- ornate head centered at (0,0), scaled -->
    <g transform="translate(0 30) scale(0.78)"><use href="#nagaHead"/></g>
  </g>

  <!-- ========== CENTER: satellites + hood + head + jewel ========== -->
  <g>
    <line x1="512" y1="260" x2="420" y2="90" stroke="#F5B642" stroke-width="3.2" opacity="0.9"/>
    <line x1="512" y1="260" x2="604" y2="90" stroke="#F5B642" stroke-width="3.2" opacity="0.9"/>
    <line x1="512" y1="260" x2="512" y2="70" stroke="#F5B642" stroke-width="3.2" opacity="0.9"/>
    <g transform="translate(420 90)"><circle r="17" fill="url(#nodeGlow)"/><circle r="8" fill="url(#nodeLeader)" stroke="#1A1332" stroke-width="2"/></g>
    <g transform="translate(604 90)"><circle r="17" fill="url(#nodeGlow)"/><circle r="8" fill="url(#nodeLeader)" stroke="#1A1332" stroke-width="2"/></g>
    <g transform="translate(512 70)"><circle r="19" fill="url(#nodeGlow)"/><circle r="9" fill="url(#nodeLeader)" stroke="#1A1332" stroke-width="2"/></g>
  </g>
  <g transform="translate(512 230)">
    <g>
      <path d="M -104 -50 Q 0 -122 104 -50 Q 96 62 0 90 Q -96 62 -104 -50 Z"
            fill="url(#hoodCenterC)" stroke="#1A1332" stroke-width="6" stroke-linejoin="round"/>
      <path d="M -78 -40 Q 0 -102 78 -40 Q 68 50 0 72 Q -68 50 -78 -40 Z"
            fill="#D4C6FD"/>
      <path d="M -92 16 Q -78 52 -64 30 Q -54 60 -40 34 Q -28 64 -14 38
               Q -4 62 0 40 Q 4 62 14 38 Q 28 64 40 34 Q 54 60 64 30 Q 78 52 92 16"
            fill="none" stroke="#1A1332" stroke-width="3.2" stroke-linejoin="round" opacity="0.85"/>
      <!-- mandala ornament -->
      <g fill="none" stroke="#1A1332" stroke-width="2.2" opacity="0.7">
        <circle cx="0" cy="-10" r="26" stroke-dasharray="4 6"/>
        <line x1="0" y1="-36" x2="0" y2="16"/>
        <line x1="-26" y1="-10" x2="26" y2="-10"/>
        <line x1="-18" y1="-28" x2="18" y2="8"/>
        <line x1="-18" y1="8" x2="18" y2="-28"/>
      </g>
      <g fill="#F5B642">
        <circle cx="0" cy="-10" r="3.5"/>
        <circle cx="-26" cy="-10" r="2.5"/>
        <circle cx="26" cy="-10" r="2.5"/>
        <circle cx="0" cy="-36" r="2.5"/>
        <circle cx="0" cy="16" r="2.5"/>
      </g>
    </g>
    <!-- ornate head (slightly larger) -->
    <g transform="translate(0 40)"><use href="#nagaHead"/></g>
    <!-- forehead jewel for center head -->
    <circle cx="0" cy="-62" r="22" fill="url(#jewelC)" stroke="#1A1332" stroke-width="3"/>
    <ellipse cx="-7" cy="-68" rx="7" ry="5" fill="#FFF7DC" opacity="0.9"/>
  </g>

  <!-- ========== RIGHT: satellites + hood + head ========== -->
  <g>
    <line x1="704" y1="260" x2="794" y2="150" stroke="#7DD3FC" stroke-width="3" opacity="0.85"/>
    <line x1="704" y1="260" x2="844" y2="230" stroke="#7DD3FC" stroke-width="3" opacity="0.85"/>
    <line x1="704" y1="260" x2="824" y2="360" stroke="#7DD3FC" stroke-width="3" opacity="0.85"/>
    <g transform="translate(794 150)"><circle r="17" fill="url(#nodeGlow)"/><circle r="8" fill="url(#nodeCore)" stroke="#1A1332" stroke-width="2"/></g>
    <g transform="translate(844 230)"><circle r="15" fill="url(#nodeGlow)"/><circle r="7" fill="url(#nodeCore)" stroke="#1A1332" stroke-width="2"/></g>
    <g transform="translate(824 360)"><circle r="15" fill="url(#nodeGlow)"/><circle r="7" fill="url(#nodeCore)" stroke="#1A1332" stroke-width="2"/></g>
  </g>
  <g transform="translate(704 242)">
    <g transform="scale(0.88)">
      <path d="M -95 -20 Q 0 -96 95 -20 Q 88 68 0 92 Q -88 68 -95 -20 Z"
            fill="url(#hoodRightC)" stroke="#1A1332" stroke-width="5" stroke-linejoin="round"/>
      <path d="M -74 -14 Q 0 -76 74 -14 Q 68 56 0 74 Q -68 56 -74 -14 Z"
            fill="#D4C6FD"/>
      <path d="M -82 14 Q -70 44 -58 26 Q -50 52 -38 30 Q -28 56 -16 34
               Q -6 58 0 36 Q 6 58 16 34 Q 28 56 38 30 Q 50 52 58 26 Q 70 44 82 14"
            fill="none" stroke="#1A1332" stroke-width="2.8" stroke-linejoin="round" opacity="0.8"/>
      <g fill="#F5B642">
        <circle cx="0" cy="-10" r="3"/>
        <circle cx="-20" cy="15" r="2.5"/>
        <circle cx="20" cy="15" r="2.5"/>
        <circle cx="-32" cy="45" r="2"/>
        <circle cx="32" cy="45" r="2"/>
      </g>
    </g>
    <g transform="translate(0 30) scale(0.78)"><use href="#nagaHead"/></g>
  </g>

  <!-- Orbital markers on necks -->
  <g fill="#38BDF8">
    <circle cx="420" cy="290" r="5.5" stroke="#1A1332" stroke-width="1.5"/>
    <circle cx="604" cy="290" r="5.5" stroke="#1A1332" stroke-width="1.5"/>
    <circle cx="512" cy="295" r="5.5" stroke="#1A1332" stroke-width="1.5"/>
  </g>
  <g fill="#FFF7DC">
    <circle cx="420" cy="290" r="2"/>
    <circle cx="604" cy="290" r="2"/>
    <circle cx="512" cy="295" r="2"/>
  </g>
</svg>
